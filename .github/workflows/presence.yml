name: presence

# Riceve i "push" dai telefoni (repository_dispatch) e aggiorna presence.json.
# Eventi: user_casa/user_fuori (telefono utente), jess_casa/jess_fuori (telefono Jessica),
#         casa/fuori (override manuale dal bot = entrambi).
on:
  repository_dispatch:
    types: [casa, fuori, user_casa, user_fuori, jess_casa, jess_fuori]

permissions:
  contents: write

jobs:
  set:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Aggiorna presence.json
        env:
          EV: ${{ github.event.action }}
        run: |
          python3 - <<'PY'
          import json, os
          ev = os.environ["EV"]
          try:
              d = json.load(open("presence.json"))
          except Exception:
              d = {"user": "away", "jess": "away"}
          if ev == "casa":        d = {"user": "home", "jess": "home"}
          elif ev == "fuori":     d = {"user": "away", "jess": "away"}
          elif ev == "user_casa":  d["user"] = "home"
          elif ev == "user_fuori": d["user"] = "away"
          elif ev == "jess_casa":  d["jess"] = "home"
          elif ev == "jess_fuori": d["jess"] = "away"
          json.dump(d, open("presence.json", "w"))
          print(d)
          PY
      - name: Commit
        run: |
          git config user.name clima
          git config user.email clima@local
          git add presence.json
          git commit -m "presence: ${{ github.event.action }}" || echo "nessun cambiamento"
          for i in 1 2 3; do
            git pull --rebase --autostash && git push && break || sleep 4
          done
