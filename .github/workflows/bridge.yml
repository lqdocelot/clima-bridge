name: clima-bridge

on:
  schedule:
    - cron: '*/15 * * * *'   # ogni ~15 minuti (GitHub a volte ritarda un po')
  workflow_dispatch: {}        # permette l'avvio manuale dal sito

# evita esecuzioni sovrapposte
concurrency:
  group: clima-bridge
  cancel-in-progress: false

permissions:
  contents: write   # per salvare autostate.json (memoria blocco manuale)

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'   # evita di riscaricare le dipendenze ogni 15 minuti
      - run: pip install --quiet -r requirements.txt
      - name: Esegui il ponte clima
        env:
          TZ: Europe/Rome                                   # ora locale italiana (le fasce orarie sono in ora IT)
          DRY_RUN: ${{ vars.DRY_RUN || 'true' }}          # default sicuro; metti la variabile DRY_RUN=false per agire
          PRESENCE_URL: ${{ vars.PRESENCE_URL }}            # flag presenza (raw di presence.json)
          PRESENCE_ENABLED: ${{ vars.PRESENCE_ENABLED || 'false' }}  # presenza disattivata finché non c'è l'automazione WiFi (riattiva: Variable=true)
          TARGET: ${{ vars.TARGET || '25' }}                  # comfort dolce (sempre)
          MAX_DELTA: ${{ vars.MAX_DELTA || '6' }}             # Δ max interno-esterno (anti shock termico)
          MAINTENANCE_MAX: ${{ vars.MAINTENANCE_MAX || '28' }} # via di casa: raffresca solo sopra questa
          RH_DRY_ON: ${{ vars.RH_DRY_ON || '62' }}             # umidità % oltre cui passare in dry
          RH_DRY_OFF: ${{ vars.RH_DRY_OFF || '55' }}           # umidità % sotto cui tornare in cool
          NIGHT_FROM: ${{ vars.NIGHT_FROM || '22' }}           # cameretta: inizio notte (solo ventola)
          NIGHT_TO: ${{ vars.NIGHT_TO || '8' }}                # cameretta: fine notte
          SAFE_TARGET: ${{ vars.SAFE_TARGET || '26' }}         # emergenza 'modalità sicura': setpoint cool gentile
          FGLAIR_EMAIL: ${{ secrets.FGLAIR_EMAIL }}
          FGLAIR_PASSWORD: ${{ secrets.FGLAIR_PASSWORD }}
          AQARA_EMAIL: ${{ secrets.AQARA_EMAIL }}
          AQARA_PASSWORD: ${{ secrets.AQARA_PASSWORD }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bridge_cloud.py
      - name: Salva stato (autostate.json) se cambiato
        run: |
          git config user.name clima
          git config user.email clima@local
          git add autostate.json sensors.json
          if git diff --staged --quiet; then
            echo "nessun cambio di stato"
          else
            git commit -m "autostate"
            for i in 1 2 3; do
              git pull --rebase --autostash && git push && break || sleep 4
            done
          fi
