name: clima-bridge

on:
  schedule:
    - cron: '*/15 * * * *'   # ogni ~15 minuti (GitHub a volte ritarda un po')
  workflow_dispatch: {}        # permette l'avvio manuale dal sito

# evita esecuzioni sovrapposte
concurrency:
  group: clima-bridge
  cancel-in-progress: false

permissions:
  contents: write   # per salvare autostate.json (memoria blocco manuale)

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install --quiet -r requirements.txt
      - name: Esegui il ponte clima
        env:
          TZ: Europe/Rome                                   # ora locale italiana (le fasce orarie sono in ora IT)
          DRY_RUN: ${{ vars.DRY_RUN || 'true' }}          # default sicuro; metti la variabile DRY_RUN=false per agire
          PRESENCE_URL: ${{ vars.PRESENCE_URL }}            # flag presenza (raw di presence.json)
          TARGET: ${{ vars.TARGET || '25' }}                # target normale (solo adulto a casa)
          TARGET_SOFT: ${{ vars.TARGET_SOFT || '25' }}      # target soft quando ci sono i bimbi (Jessica a casa)
          MAX_DELTA: ${{ vars.MAX_DELTA || '6' }}           # Δ max interno-esterno (anti shock termico)
          NIGHT_BUMP: ${{ vars.NIGHT_BUMP || '1.5' }}       # setback notturno soggiorno (23-7)
          HOLD_HOURS: ${{ vars.HOLD_HOURS || '1' }}         # blocco manuale: pausa automatismo dopo un cambio a mano
          WAKE_HOUR: ${{ vars.WAKE_HOUR || '9.5' }}          # cameretta: riaccensione mattutina feriali (09:30)
          WAKE_HOUR_HOME: ${{ vars.WAKE_HOUR_HOME || '12' }} # cameretta: riaccensione weekend/festivi (12:00)
          HARD_QUIET_END: ${{ vars.HARD_QUIET_END || '7' }}  # cameretta: notte assoluta 22-07; dopo, coda scavalcabile a mano
          FGLAIR_EMAIL: ${{ secrets.FGLAIR_EMAIL }}
          FGLAIR_PASSWORD: ${{ secrets.FGLAIR_PASSWORD }}
          AQARA_EMAIL: ${{ secrets.AQARA_EMAIL }}
          AQARA_PASSWORD: ${{ secrets.AQARA_PASSWORD }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bridge_cloud.py
      - name: Salva stato (autostate.json) se cambiato
        run: |
          git config user.name clima
          git config user.email clima@local
          git add autostate.json sensors.json
          if git diff --staged --quiet; then
            echo "nessun cambio di stato"
          else
            git commit -m "autostate"
            for i in 1 2 3; do
              git pull --rebase --autostash && git push && break || sleep 4
            done
          fi
